services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: ${PGDATABASE}
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER} -d ${PGDATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: taqdimot-django-web
    restart: always
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    # ✅ /app/staticfiles/ → 200 qaytarmasligi mumkin, shuning uchun /admin/ ishlatildi
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/admin/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  bot:
    build: .
    container_name: telegram-bot
    restart: always
    volumes:
      - .:/app
    # ✅ Faqat db ga bog'liq — web tayyor bo'lishini kutish shart emas
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: ["/app/entrypoint-bot.sh"]

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro        # ← SSL sertifikat
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web
      
volumes:
  postgres_data:
  media_volume:
  static_volume: